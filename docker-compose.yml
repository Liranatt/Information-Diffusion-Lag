# 24/7 trader daemon for live paper trading on liranserver (192.168.1.159).
#
# This host ALREADY runs the shared infrastructure:
#   * ib-gateway container -> paper API published on 0.0.0.0:4004 (restart=always,
#     TRADING_MODE=paper, READ_ONLY_API=no). Managed outside this compose file.
#   * Postgres (my_traders_db) on 192.168.1.159:5432, holding the live tables.
#
# So this stack is JUST the trader daemon, on host networking, reusing the .env
# values that already work from a host process (IB_HOST=192.168.1.159,
# IB_PORT=4004, DB_HOST=192.168.1.159). No second gateway, no host.docker.internal,
# no pg_hba changes -- a host-net container is network-identical to a host process.
#
# Build + validate:  docker compose run --rm trader python -m interactive_brokers.run_live --once --dry-run
# Go 24/7:           docker compose up -d --build
# Logs:              docker compose logs -f trader
# Status:            docker compose run --rm trader python -m interactive_brokers.run_live --status

services:
  trader:
    build: .
    image: cem-trader:latest
    restart: unless-stopped
    network_mode: host            # share host netns: the .env LAN IPs just work
    env_file:
      - .env                      # DB creds, IB_HOST/PORT (4004), Gemini key, etc.
    environment:
      LIVE_TRACK_API_COST: "1"    # log Gemini token usage/cost to live_api_costs
    volumes:
      - .:/app                    # live source + data/ (refit CSVs propagate) + .env
    command: ["python", "-m", "interactive_brokers.run_live", "--daemon"]

  # Read-only live dashboard at http://<host>:8080 (LAN). Never trades.
  # Reuses the image built by `trader` (no separate build).
  dashboard:
    image: cem-trader:latest
    restart: unless-stopped
    depends_on:
      - trader
    network_mode: host            # binds 0.0.0.0:8080, reaches Postgres on the host
    env_file:
      - .env
    environment:
      DASHBOARD_PORT: "8080"
    volumes:
      - .:/app
    command: ["python", "-m", "interactive_brokers.dashboard"]
